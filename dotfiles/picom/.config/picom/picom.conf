# =========================
# BACKEND
# =========================
backend = "glx";
vsync = true;

# =========================
# SHADOW
# =========================
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.4;

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'Dunst'"
];

# =========================
# FADING
# =========================
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# =========================
# TRANSPARENCY
# =========================
inactive-opacity = 0.95;
active-opacity = 1.0;

# =========================
# BLUR (nhẹ thôi, không lag)
# =========================
blur-method = "dual_kawase";
blur-strength = 5;

blur-background = true;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# =========================
# PERFORMANCE
# =========================
use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;

# =========================
# ROUND CORNERS (nhẹ)
# =========================
corner-radius = 8;