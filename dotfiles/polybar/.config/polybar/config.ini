[colors]
bg = #2E3440
fg = #ECEFF4
frost = #81A1C1
accent = #88C0D0
urgent = #BF616A
dim = #4C566A

[bar/main]
width = 100%
height = 28
radius = 10

background = ${colors.bg}
foreground = ${colors.fg}

padding-left = 2
padding-right = 2

module-margin = 2

font-0 = JetBrainsMono Nerd Font:size=10;2

modules-left = bspwm
modules-center = date
modules-right = pulseaudio battery

tray-position = right

wm-restack = bspwm

# =========================
# WORKSPACES
# =========================
[module/bspwm]
type = internal/bspwm

label-focused = %name%
label-focused-foreground = ${colors.frost}
label-focused-underline = ${colors.frost}

label-occupied = %name%
label-occupied-foreground = ${colors.fg}

label-empty = %name%
label-empty-foreground = ${colors.dim}

# =========================
# AUDIO
# =========================
[module/pulseaudio]
type = internal/pulseaudio

format-volume =   %percentage%%
format-muted =  muted

# =========================
# BATTERY
# =========================
[module/battery]
type = internal/battery
battery = BAT0
adapter = AC

format-charging =  %percentage%%
format-discharging =   %percentage%%

# =========================
# DATE / TIME
# =========================
[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d